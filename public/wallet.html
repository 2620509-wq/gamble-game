<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임머니</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; }
        .card { background: #1e293b; padding: 20px; max-width: 340px; margin: 20px auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: left; }
        button { width: 100%; padding: 12px; margin: 4px 0; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <h2>게임머니</h2>
    <div id="p-name" style="font-size: 22px; color: #38bdf8; font-weight: bold;">정보 로딩 중...</div>

    <div class="card">
        <h3 style="margin-top: 0; color: #94a3b8;">💳 보유 지갑 잔액</h3>
        <div id="wallet-display" style="font-size: 32px; font-weight: bold; color: #f59e0b;">0원</div>
    </div>

    <div class="card" style="border: 2px dashed #334155;">
        <h3 style="margin-top: 0; color: #10b981;">🎰 게임 테이블 선택 입장</h3>
        <button style="background: #064e3b; margin-bottom: 6px;" onclick="checkIn('blackjack')"> 블랙잭(21) 매트 입장</button>
        <button style="background: #450a0a; margin-bottom: 6px;" onclick="checkIn('holdem')"> 텍사스 홀덤 매트 입장</button>
        <button style="background: #2e1065; margin-bottom: 6px;" onclick="checkIn('indian')"> 인디안 포커 매트 입장</button>
    </div>

    <script>
        const socket = io();
        const pathSegments = window.location.pathname.split('/');
        const pNum = parseInt(pathSegments[pathSegments.length - 1]) || 1;

        socket.on('game_update', (data) => {
            const me = data.players.find(p => p.index === pNum);
            if (me) {
                document.getElementById('p-name').innerText = `${me.name} (${pNum}번 시트)`;
                document.getElementById('wallet-display').innerText = `${me.walletMoney.toLocaleString()}원`;
            }
        });

        function uiChargeMoney(amt) {
            fetch('/api/wallet/charge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pNum: pNum, amount: amt })
            });
        }

                // public/wallet.html 내부 checkIn 함수를 아래처럼 최종 수정
        function checkIn(gameType) {
            // 🌟 핵심: 서버에 입장 요청을 보낼 때 어떤 게임판인지 gameType을 같이 전달합니다.
            socket.emit('nfc_table_checkin', { pNum: pNum, gameType: gameType });
            
            const gameUrl = `/game/${pNum}?type=${gameType}`;
            window.open(gameUrl, `game_table_${pNum}`, "width=400,height=720,resizable=no,scrollbars=yes");
        }

        function checkOut() { socket.emit('nfc_table_checkout', { pNum: pNum }); }
    </script>
</body>
</html>
