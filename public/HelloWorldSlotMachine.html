<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>헬로우월드 슬롯머신 - 배당금 동기화 버전</title>
  <script src="/socket.io/socket.io.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Rajdhani:wght=600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #120224;
      --panel-bg: rgba(22, 10, 42, 0.9);
      --border-color: #3d1c68;
      --cyan: #00f0ff;
      --magenta: #ff007f;
      --yellow: #ffee00;
      --gold: #ffd700;
      --purple: #bc13fe;
      --green: #39ff14;
      
      --glow-cyan: 0 0 15px rgba(0, 240, 255, 0.8);
      --glow-magenta: 0 0 15px rgba(255, 0, 127, 0.8);
      --glow-yellow: 0 0 15px rgba(255, 238, 0, 0.8);
      --glow-gold: 0 0 15px rgba(255, 215, 0, 0.8);
      --glow-purple: 0 0 15px rgba(188, 19, 254, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: #fff;
      font-family: 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 50% 20%, #460975 0%, #120224 80%),
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      background-size: 100% 100%, 100% 4px;
    }

    #fx-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
    }

    .app-container {
      width: 100%;
      max-width: 1050px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    header {
      text-align: center;
    }

    .main-title {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--gold);
      text-shadow: var(--glow-gold);
    }

    .game-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 25px;
      align-items: start;
    }

    .left-zone {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .cabinet-header {
      background: linear-gradient(135deg, #b8860b 0%, #ffd700 50%, #b8860b 100%);
      border: 3px solid var(--gold);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      color: #000;
      font-weight: 900;
      font-size: 1.3rem;
      text-align: center;
      padding: 10px 0;
      letter-spacing: 4px;
    }

    .cabinet-wrapper {
      background: linear-gradient(180deg, #240c42 0%, #0d031c 100%);
      border: 4px solid var(--gold);
      border-radius: 0 0 12px 12px;
      padding: 15px;
      position: relative;
    }

    .cabinet-shake { animation: screen-shake 0.35s ease-out; }
    @keyframes screen-shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      15% { transform: translate(-3px, 2px) rotate(-1deg); }
      30% { transform: translate(3px, -2px) rotate(1deg); }
      60% { transform: translate(3px, 2px) rotate(1deg); }
    }

    .slot-frame {
      position: relative;
      border: 4px solid #000;
      border-radius: 8px;
      background: #020205;
      overflow: hidden;
    }

    .slot-grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      height: 372px;
    }

    .reel-viewport {
      height: 360px;
      background: rgba(5, 2, 12, 0.9);
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.95);
    }

    .reel-strip {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .symbol-cell {
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3.6rem;
    }

    .reel-viewport::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.95) 0%, transparent 15%, transparent 85%, rgba(0, 0, 0, 0.95) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .paylines-overlay {
      position: absolute;
      top: 6px; left: 6px;
      width: calc(100% - 12px); height: calc(100% - 12px);
      pointer-events: none;
      z-index: 5;
    }

    .payline-path {
      fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: 0;
      filter: drop-shadow(0 0 6px var(--stroke-color));
    }

    .payline-path.active {
      opacity: 0.95;
      animation: payline-pulse 1s infinite alternate;
    }

    @keyframes payline-pulse {
      0% { stroke-width: 5; }
      100% { stroke-width: 8; filter: drop-shadow(0 0 16px var(--stroke-color)); }
    }

    .symbol-cell.winner {
      animation: win-super-blink 0.4s ease-in-out infinite alternate;
      z-index: 10;
    }

    @keyframes win-super-blink {
      0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6)) brightness(1); }
      100% { transform: scale(1.15); filter: drop-shadow(0 0 25px var(--gold)) brightness(1.4); }
    }

    .controls-container {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
      align-items: center;
    }

    .spin-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold) 0%, #d4af37 50%, #aa7c11 100%);
      border: 3px solid #ffeb3b;
      border-radius: 8px;
      color: #000;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 4px;
      padding: 14px 0;
      cursor: pointer;
      box-shadow: var(--glow-gold);
    }

    .spin-btn.confirm-pending {
      background: linear-gradient(135deg, #39ff14 0%, #20c997 100%) !important;
      border-color: #fff !important;
      color: #000 !important;
      animation: confirm-blink 0.8s infinite alternate;
      box-shadow: 0 0 20px var(--green) !important;
    }

    @keyframes confirm-blink {
      0% { opacity: 0.8; }
      100% { opacity: 1; transform: scale(1.02); }
    }

    .spin-btn:disabled {
      background: #181420; color: rgba(255, 255, 255, 0.15); border: 1px solid #333; box-shadow: none; cursor: not-allowed;
    }

    .auto-spin-panel {
      background: var(--panel-bg);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100%;
    }

    .auto-label {
      font-size: 0.9rem; font-weight: 700; display: flex; flex-direction: column; gap: 2px;
    }

    .auto-label-sub { font-size: 0.75rem; color: var(--cyan); font-weight: 900; }

    .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1a1030; border: 1px solid var(--border-color); transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: rgba(255, 255, 255, 0.4); transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: rgba(255, 0, 127, 0.25); border-color: var(--magenta); }
    input:checked + .slider:before { transform: translateX(22px); background-color: var(--magenta); box-shadow: var(--glow-magenta); }

    .right-zone {
      display: flex;
      flex-direction: column;
      gap: 15px;
      height: 100%;
    }

    .stats-vertical-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-card {
      background: var(--panel-bg);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
    }

    .stat-card.balance-card { border: 2.5px solid var(--cyan); box-shadow: var(--glow-cyan); }
    .stat-card.bet-card { border: 2.5px solid var(--yellow); box-shadow: var(--glow-yellow); }
    .stat-card.win-card { border: 2.5px solid rgba(255, 0, 127, 0.3); }
    .stat-card.win-card.win-active { border: 3px solid var(--magenta); box-shadow: var(--glow-magenta); }
    .stat-card.total-win-card { border: 2.5px solid rgba(188, 19, 254, 0.4); }

    .stat-label { font-size: 1.05rem; font-weight: 800; color: #fff; }
    .stat-value { font-size: 1.6rem; font-weight: 900; }
    
    .balance-value-wrapper { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .net-profit-badge { font-size: 0.85rem; font-weight: 800; letter-spacing: 0.5px; }
    .profit-plus { color: var(--green); text-shadow: 0 0 6px rgba(57, 255, 20, 0.6); }
    .profit-minus { color: var(--magenta); text-shadow: 0 0 6px rgba(255, 0, 127, 0.6); }
    .profit-zero { color: rgba(255,255,255,0.4); }

    #balance-val { color: var(--cyan); }
    #bet-val { color: var(--yellow); }
    #win-val { color: var(--magenta); }
    #total-win-val { color: var(--purple); }

    .bet-control-wrapper { display: flex; align-items: center; gap: 8px; }
    
    .bet-adjust-btn {
      background: #251245; border: 2px solid var(--yellow); color: var(--yellow);
      font-size: 1.1rem; font-weight: 900; width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .bet-adjust-btn:hover:not(:disabled) { background: var(--yellow); color: #000; }
    .bet-adjust-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

    .all-in-btn {
      background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 100%);
      border: 1.5px solid var(--magenta); color: #fff; font-weight: 900; font-size: 0.85rem;
      padding: 5px 10px; border-radius: 4px; cursor: pointer;
    }
    .all-in-btn:hover:not(:disabled) { filter: brightness(1.2); box-shadow: var(--glow-magenta); }
    .all-in-btn:disabled { background: #333; border-color: #444; color: #777; cursor: not-allowed; }

    .win-multiplier-text {
      font-size: 0.85rem; font-weight: 900; color: var(--gold);
      background: rgba(255, 215, 0, 0.12); border: 1.2px dashed var(--gold);
      padding: 2px 8px; border-radius: 4px; display: none;
    }

    .paytable-card {
      background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 8px;
      padding: 16px; display: flex; flex-direction: column; flex-grow: 1; justify-content: center;
    }

    .paytable-title {
      font-size: 1rem; color: var(--gold); font-weight: 800; border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px; margin-bottom: 15px; text-align: center;
    }

    .paytable-grid { display: flex; flex-direction: column; gap: 8px; }
    .paytable-item {
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 6px;
      padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    }

    .paytable-symbol-side { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; }
    .paytable-symbol-name { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
    .paytable-multiplier { font-size: 1.1rem; color: var(--yellow); font-weight: 700; }

    .math-info {
      margin-top: 15px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); text-align: center; line-height: 1.4;
    }

    .big-win-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
      z-index: 1000; display: none; justify-content: center; align-items: center;
    }

    .big-win-banner {
      background: radial-gradient(circle, #5a14a3 0%, #17022e 100%);
      border: 5px solid var(--gold); border-radius: 16px;
      padding: 40px; text-align: center; width: 90%; max-width: 500px;
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
      transform: scale(0.8); opacity: 0; transition: all 0.40s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .big-win-banner.show { transform: scale(1); opacity: 1; }
    .big-win-title { font-size: 3rem; font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--gold); text-shadow: var(--glow-gold); margin-bottom: 10px; }
    .big-win-subtitle { font-size: 1.4rem; color: #fff; font-weight: 700; margin-bottom: 25px; }
    .big-win-payout { font-size: 2.8rem; font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--cyan); text-shadow: var(--glow-cyan); margin-bottom: 30px; }
    
    .big-win-btn {
      background: linear-gradient(135deg, #39ff14 0%, #00ffaa 100%);
      border: none; border-radius: 8px; color: #000; font-size: 1.2rem; font-weight: 900;
      padding: 12px 30px; cursor: pointer; box-shadow: 0 0 15px var(--green);
    }

    .custom-alert {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.65); display: none; justify-content: center; align-items: center; z-index: 2000;
    }
    .alert-box {
      background: #18092d; border: 2.5px solid var(--magenta); border-radius: 12px;
      padding: 25px 35px; width: 90%; max-width: 360px; text-align: center;
      box-shadow: var(--glow-magenta);
    }
    .alert-btn {
      background: var(--magenta); border: none; border-radius: 4px; color: white;
      padding: 8px 24px; font-weight: 900; cursor: pointer; margin-top: 10px;
    }

    @media(max-width: 850px) {
      .game-layout { grid-template-columns: 1fr; }
      .app-container { max-width: 520px; }
    }
  </style>
</head>
<body>
  <canvas id="fx-canvas"></canvas>

  <div class="custom-alert" id="custom-alert">
    <div class="alert-box">
      <div style="font-size:1.3rem; font-weight:900; color:var(--magenta); margin-bottom:15px;">알림</div>
      <div id="alert-message" style="margin-bottom:20px;">잔액이 부족합니다.</div>
      <button class="alert-btn" onclick="closeAlert()">확인</button>
    </div>
  </div>

  <div class="app-container">
    <header>
      <h1 class="main-title">헬로우월드 슬롯머신</h1>
    </header>

    <div class="game-layout">
      <div class="left-zone">
        <div class="cabinet-header">행운의 회전판</div>
        <div class="cabinet-wrapper" id="cabinet-box">
          <div class="slot-frame">
            <div class="slot-grid-container" id="slot-grid">
              <div class="reel-viewport"><div class="reel-strip" id="reel-0"></div></div>
              <div class="reel-viewport"><div class="reel-strip" id="reel-1"></div></div>
              <div class="reel-viewport"><div class="reel-strip" id="reel-2"></div></div>
            </div>

            <svg class="paylines-overlay" viewBox="0 0 360 360" id="paylines-svg">
              <path id="payline-1" class="payline-path" d="M 10 180 L 350 180" style="--stroke-color: var(--cyan); stroke: var(--cyan);"></path>
              <path id="payline-2" class="payline-path" d="M 10 60 L 350 60" style="--stroke-color: var(--magenta); stroke: var(--magenta);"></path>
              <path id="payline-3" class="payline-path" d="M 10 300 L 350 300" style="--stroke-color: var(--magenta); stroke: var(--magenta);"></path>
              <path id="payline-4" class="payline-path" d="M 30 30 L 330 330" style="--stroke-color: var(--yellow); stroke: var(--yellow);"></path>
              <path id="payline-5" class="payline-path" d="M 30 330 L 330 30" style="--stroke-color: var(--yellow); stroke: var(--yellow);"></path>
            </svg>
          </div>
        </div>

        <div class="controls-container">
          <button class="spin-btn" id="spin-btn" onclick="handleSpinClick()">스핀</button>
          <div class="auto-spin-panel">
            <div class="auto-label">
              <span>자동 스핀</span>
              <span class="auto-label-sub" id="auto-status">꺼짐</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="auto-toggle" onchange="toggleAutoSpin()">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="right-zone">
        <div class="stats-vertical-box">
          <div class="stat-card balance-card">
            <span class="stat-label">보유 자산</span>
            <div class="balance-value-wrapper">
              <span class="stat-value" id="balance-val">0</span>
              <span class="net-profit-badge profit-zero" id="net-profit-val">(+0)</span>
            </div>
          </div>

          <div class="stat-card bet-card">
            <span class="stat-label">총 베팅액</span>
            <div class="bet-control-wrapper">
              <button class="bet-adjust-btn" id="bet-minus-btn" onclick="adjustBet(-5000)">-</button>
              <span class="stat-value" id="bet-val">5,000</span>
              <button class="bet-adjust-btn" id="bet-plus-btn" onclick="adjustBet(5000)">+</button>
              <button class="all-in-btn" id="all-in-btn" onclick="triggerAllIn()">올인</button>
            </div>
          </div>

          <div class="stat-card win-card" id="win-card-container">
            <span class="stat-label">획득 배당금 <span class="win-multiplier-text" id="win-multiplier-badge">x0</span></span>
            <span class="stat-value" id="win-val">0</span>
          </div>

          <div class="stat-card total-win-card">
            <span class="stat-label">누적 당첨액</span>
            <span class="stat-value" id="total-win-val">0</span>
          </div>
        </div>

        <div class="paytable-card">
          <div class="paytable-title">배당 기준표 (라인당 금액 기준)</div>
          <div class="paytable-grid">
            <div class="paytable-item">
              <div class="paytable-symbol-side"><span>💎</span> <span class="paytable-symbol-name">다이아몬드</span></div>
              <div class="paytable-multiplier">x40</div>
            </div>
            <div class="paytable-item">
              <div class="paytable-symbol-side"><span>🔔</span> <span class="paytable-symbol-name">골든벨</span></div>
              <div class="paytable-multiplier">x15</div>
            </div>
            <div class="paytable-item">
              <div class="paytable-symbol-side"><span>🍉</span> <span class="paytable-symbol-name">수박</span></div>
              <div class="paytable-multiplier">x8</div>
            </div>
            <div class="paytable-item">
              <div class="paytable-symbol-side"><span>🍒</span> <span class="paytable-symbol-name">체리</span></div>
              <div class="paytable-multiplier">x4</div>
            </div>
          </div>
          <div class="math-info">
            총 5개의 페이라인이 상시 작동 중입니다.<br>
            총 베팅액 = 라인당 베팅금(<span id="line-bet-val">1,000</span>) × 5
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="big-win-overlay" id="big-win-overlay">
    <div class="big-win-banner" id="big-win-banner">
      <div class="big-win-title">BIG WIN!</div>
      <div class="big-win-subtitle" id="big-win-mult">축하합니다! 총 배팅액의 12배 대박 당첨!</div>
      <div class="big-win-payout" id="big-win-payout-val">₩120,000</div>
      <button class="big-win-btn" onclick="confirmBigWin()">당첨금 수령</button>
    </div>
  </div>

  <script>
    const pathSegments = window.location.pathname.split('/');
    const pNum = parseInt(pathSegments[pathSegments.length - 1]);
    const socket = io();

    class PartyFXSystem {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.active = false;
        this.resize();
        window.addEventListener('resize', () => this.resize());
      }
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      spawnBurst(count) {
        this.active = true;
        const colors = ['#00f0ff', '#ff007f', '#ffee00', '#ffd700', '#bc13fe', '#39ff14'];
        for (let i = 0; i < count; i++) {
          this.particles.push({
            x: this.canvas.width / 2 + (Math.random() - 0.5) * 300,
            y: this.canvas.height / 3 + (Math.random() - 0.5) * 150,
            vx: (Math.random() - 0.5) * 16,
            vy: -Math.random() * 14 - 4,
            size: Math.random() * 8 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * Math.PI * 2,
            vRotation: (Math.random() - 0.5) * 0.25,
            gravity: 0.38,
            friction: 0.985,
            bounce: 0.65,
            life: 1.0,
            decay: 0.008 + Math.random() * 0.012
          });
        }
      }
      update() {
        if (!this.active) return;
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        let remains = [];
        for (const p of this.particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.gravity;
          p.vx *= p.friction;
          p.vy *= p.friction;
          p.life -= p.decay;
          if (p.y > this.canvas.height - p.size) {
            p.y = this.canvas.height - p.size;
            p.vy = -p.vy * p.bounce;
          }
          if (p.life > 0) {
            remains.push(p);
            this.ctx.save();
            this.ctx.translate(p.x, p.y);
            this.ctx.globalAlpha = p.life;
            this.ctx.fillStyle = p.color;
            this.ctx.beginPath();
            this.ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
            this.ctx.fill();
            this.ctx.restore();
          }
        }
        this.particles = remains;
        if (this.particles.length === 0) this.active = false;
      }
      loop() {
        this.update();
        requestAnimationFrame(() => this.loop());
      }
    }

    const SYMBOLS = [
      { name: '다이아몬드', icon: '💎', weight: 8, multiplier: 40 },
      { name: '골든벨', icon: '🔔', weight: 14, multiplier: 15 },
      { name: '수박', icon: '🍉', weight: 22, multiplier: 8 },
      { name: '체리', icon: '🍒', weight: 32, multiplier: 4 }
    ];

    const PAYLINES = [
      { id: 1, cells: [[0,1], [1,1], [2,1]] },
      { id: 2, cells: [[0,0], [1,0], [2,0]] },
      { id: 3, cells: [[0,2], [1,2], [2,2]] },
      { id: 4, cells: [[0,0], [1,1], [2,2]] },
      { id: 5, cells: [[0,2], [1,1], [2,0]] }
    ];

    const sound = {
      ctx: null,
      init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
      },
      playSpin() {
        this.init();
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(450, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.4);
      },
      playStop(reelIndex) {
        this.init();
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        const pitch = 240 + (reelIndex * 120);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(pitch, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.14, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.12);
      },
      playWin(amount) {
        this.init();
        if (!this.ctx) return;
        const time = this.ctx.currentTime;
        const notes = amount >= 20000 ? [261.63, 329.63, 392.00, 523.25, 659.25, 783.99] : [261.63, 329.63, 392.00];
        notes.forEach((pitch, idx) => {
          const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(pitch, time + (idx * 0.08));
          gain.gain.setValueAtTime(0.12, time + (idx * 0.08));
          gain.gain.exponentialRampToValueAtTime(0.01, time + (idx * 0.08) + 0.35);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(time + (idx * 0.08));
          osc.stop(time + (idx * 0.08) + 0.35);
        });
      },
      playError() {
        this.init();
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(120, this.ctx.currentTime);
        osc.frequency.setValueAtTime(90, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
      }
    };

    const INITIAL_BALANCE = 0;
    const state = {
      balance: INITIAL_BALANCE,
      bet: 5000,
      totalWin: 0,
      isSpinning: false,
      isAutoSpin: false,
      autoSpinTimer: null,
      currentMatrix: [
        ['🍉', '🍉', '🍉'],
        ['🍉', '🍉', '🍉'],
        ['🍉', '🍉', '🍉']
      ],
      isPendingConfirm: false,
      isButtonDelayActive: false,
      pendingEarnings: 0
    };

    const reelStrips = [
      document.getElementById('reel-0'),
      document.getElementById('reel-1'),
      document.getElementById('reel-2')
    ];

    function refreshSlotBalance() {
      socket.emit('request_balance', { pNum: pNum });
    }

    // 🔧 [수정] 오타 교정 (state.credit -> state.balance)
    socket.on('respond_balance', (data) => {
      state.balance = data.balance;
      updateUI(); 
    });

    refreshSlotBalance();
    socket.on('game_update', () => refreshSlotBalance());

    const spinBtn = document.getElementById('spin-btn'),
          autoToggle = document.getElementById('auto-toggle'),
          autoStatus = document.getElementById('auto-status'),
          balanceVal = document.getElementById('balance-val'),
          netProfitVal = document.getElementById('net-profit-val'),
          betVal = document.getElementById('bet-val'),
          winVal = document.getElementById('win-val'),
          totalWinVal = document.getElementById('total-win-val');

    const winCard = document.getElementById('win-card-container'),
          winMultiplierBadge = document.getElementById('win-multiplier-badge');

    const betMinusBtn = document.getElementById('bet-minus-btn'),
          betPlusBtn = document.getElementById('bet-plus-btn'),
          allInBtn = document.getElementById('all-in-btn');

    const cabinetBox = document.getElementById('cabinet-box'),
          bigWinOverlay = document.getElementById('big-win-overlay'),
          bigWinBanner = document.getElementById('big-win-banner'),
          bigWinMult = document.getElementById('big-win-mult');

    const lineBetVal = document.getElementById('line-bet-val'),
          customAlert = document.getElementById('custom-alert'),
          alertMessage = document.getElementById('alert-message');

    let fxSystem;

    function initSlots() {
      fxSystem = new PartyFXSystem(document.getElementById('fx-canvas'));
      fxSystem.loop();
      for (let r = 0; r < 3; r++) {
        state.currentMatrix[r] = [getRandomSymbol().icon, getRandomSymbol().icon, getRandomSymbol().icon];
        renderReel(r, state.currentMatrix[r]);
      }
      updateUI();
    }

    function renderReel(reelIndex, symbolsArray) {
      reelStrips[reelIndex].innerHTML = symbolsArray.map(sym => `<div class="symbol-cell">${sym}</div>`).join('');
    }

    function updateUI() {
      balanceVal.textContent = state.balance.toLocaleString();
      betVal.textContent = state.bet.toLocaleString();
      if (lineBetVal) lineBetVal.textContent = (state.bet / 5).toLocaleString();

      const netProfit = state.balance - INITIAL_BALANCE;
      netProfitVal.className = "net-profit-badge";
      if (netProfit > 0) {
        netProfitVal.textContent = `(+${netProfit.toLocaleString()})`;
        netProfitVal.classList.add('profit-plus');
      } else if (netProfit < 0) {
        netProfitVal.textContent = `(${netProfit.toLocaleString()})`;
        netProfitVal.classList.add('profit-minus');
      } else {
        netProfitVal.textContent = `(+0)`;
        netProfitVal.classList.add('profit-zero');
      }

      betMinusBtn.disabled = state.isSpinning || state.isPendingConfirm || (state.bet <= 5000);
      betPlusBtn.disabled = state.isSpinning || state.isPendingConfirm || (state.bet >= 50000) || (state.bet + 5000 > state.balance);
      allInBtn.disabled = state.isSpinning || state.isPendingConfirm || (state.balance < 5000);
      autoToggle.disabled = state.isPendingConfirm;
    }

    function adjustBet(offset) {
      if (state.isSpinning || state.isPendingConfirm) return;
      let newBet = state.bet + offset;
      if (newBet < 5000) newBet = 5000;
      if (newBet > 50000) newBet = 50000;
      if (newBet > state.balance) {
        newBet = Math.max(5000, Math.floor(state.balance / 5000) * 5000);
      }
      state.bet = newBet;
      updateUI();
    }

    function triggerAllIn() {
      if (state.isSpinning || state.isPendingConfirm) return;
      if (state.balance < 5000) {
        showAlert("올인 실패", "최소 베팅금(5,000)이 부족합니다.");
        return;
      }
      let targetBet = Math.floor(state.balance / 5000) * 5000;
      if (targetBet > 50000) targetBet = 50000; 
      state.bet = targetBet;
      updateUI();
    }

    function getRandomSymbol() {
      const totalWeight = SYMBOLS.reduce((sum, s) => sum + s.weight, 0);
      let rand = Math.random() * totalWeight;
      for (const sym of SYMBOLS) {
        if (rand < sym.weight) return sym;
        rand -= sym.weight;
      }
      return SYMBOLS[SYMBOLS.length - 1];
    }

    // 🔧 [수정] 자산 가시적 업데이트가 확실히 동작하도록 동기화 추가
    function animateValue(element, start, end, duration, isBalanceElement = false) {
      if (start === end) {
        if (isBalanceElement) updateUI();
        return;
      }
      const range = end - start;
      let current = start;
      const startTime = performance.now();

      function step(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        current = Math.floor(start + range * progress);
        element.textContent = current.toLocaleString();

        if (isBalanceElement) {
          const netProfit = current - INITIAL_BALANCE;
          netProfitVal.className = "net-profit-badge";
          if (netProfit > 0) {
            netProfitVal.textContent = `(+${netProfit.toLocaleString()})`;
            netProfitVal.classList.add('profit-plus');
          } else if (netProfit < 0) {
            netProfitVal.textContent = `(${netProfit.toLocaleString()})`;
            netProfitVal.classList.add('profit-minus');
          } else {
            netProfitVal.textContent = `(+0)`;
            netProfitVal.classList.add('profit-zero');
          }
        }

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          element.textContent = end.toLocaleString();
          if (isBalanceElement) updateUI();
        }
      }
      requestAnimationFrame(step);
    }

    function handleSpinClick() {
      if (state.isPendingConfirm) {
        if (state.isButtonDelayActive) return;
        clearWinningEffects();
      } else {
        spin();
      }
    }

    function spin() {
      if (state.isSpinning || state.isPendingConfirm) return;
      sound.init();

      if (state.balance < state.bet) {
        sound.playError();
        showAlert("잔액 부족", "보유 자산이 부족합니다.");
        if (state.isAutoSpin) stopAutoSpin();
        return;
      }

      resetVisualEffects();
      winVal.textContent = "0";
      winCard.classList.remove('win-active');
      winMultiplierBadge.style.display = 'none';
      bigWinOverlay.style.display = 'none';

      state.balance -= state.bet;
      updateUI();

      state.isSpinning = true;
      spinBtn.disabled = true;
      sound.playSpin();

      const targetMatrix = [
        [getRandomSymbol().icon, getRandomSymbol().icon, getRandomSymbol().icon],
        [getRandomSymbol().icon, getRandomSymbol().icon, getRandomSymbol().icon],
        [getRandomSymbol().icon, getRandomSymbol().icon, getRandomSymbol().icon]
      ];

      const cellHeight = 120, numIntermediates = 15, reelDurations = [1000, 1500, 2000];

      for (let r = 0; r < 3; r++) {
        const reelEl = reelStrips[r];
        const intermediateSymbols = Array.from({ length: numIntermediates }, () => getRandomSymbol().icon);
        const fullSequence = [...state.currentMatrix[r], ...intermediateSymbols, ...targetMatrix[r]];
        
        reelEl.innerHTML = fullSequence.map(sym => `<div class="symbol-cell">${sym}</div>`).join('');
        reelEl.style.transition = 'none';
        reelEl.style.transform = 'translateY(0px)';
        
        const scrollDistance = (fullSequence.length - 3) * cellHeight;

        setTimeout(() => {
          reelEl.style.transition = `transform ${reelDurations[r]}ms cubic-bezier(0.25, 0.1, 0.2, 1)`;
          reelEl.style.transform = `translateY(-${scrollDistance}px)`;
        }, 20);

        setTimeout(() => {
          renderReel(r, targetMatrix[r]);
          reelEl.style.transition = 'none';
          reelEl.style.transform = 'translateY(0px)';
          sound.playStop(r);

          if (r === 2) {
            state.currentMatrix = targetMatrix;
            evaluateGame();
          }
        }, reelDurations[r] + 50);
      }
    }

    function evaluateGame() {
      state.isSpinning = false;
      let totalWin = 0;
      let winningLines = [];
      let winningCells = new Set();
      const lineBet = state.bet / 5;

      PAYLINES.forEach(line => {
        const [c0, c1, c2] = line.cells;
        const sym0 = state.currentMatrix[c0[0]][c0[1]];
        const sym1 = state.currentMatrix[c1[0]][c1[1]];
        const sym2 = state.currentMatrix[c2[0]][c2[1]];

        if (sym0 === sym1 && sym1 === sym2) {
          const matchedConfig = SYMBOLS.find(s => s.icon === sym0);
          if (matchedConfig) {
            const winAmount = lineBet * matchedConfig.multiplier;
            totalWin += winAmount;
            winningLines.push(line.id);
            line.cells.forEach(cell => winningCells.add(`${cell[0]}-${cell[1]}`));
          }
        }
      });

      if (totalWin > 0) {
        state.pendingEarnings = totalWin;
        const displayRatio = Number((totalWin / state.bet).toFixed(1));

        winVal.textContent = totalWin.toLocaleString();
        winMultiplierBadge.textContent = `x${displayRatio}`;
        winMultiplierBadge.style.display = 'inline-block';
        
        cabinetBox.classList.add('cabinet-shake');
        setTimeout(() => cabinetBox.classList.remove('cabinet-shake'), 350);

        fxSystem.spawnBurst(85);

        if (displayRatio >= 5) {
          state.isPendingConfirm = true;
          state.isButtonDelayActive = true;
          
          bigWinMult.textContent = `축하합니다! 총 배팅액의 ${displayRatio}배 대박 당첨!`;
          document.getElementById('big-win-payout-val').textContent = `₩${totalWin.toLocaleString()}`;
          bigWinOverlay.style.display = 'flex';
          
          setTimeout(() => bigWinBanner.classList.add('show'), 50);
          setTimeout(() => state.isButtonDelayActive = false, 1200);

          spinBtn.textContent = "수령 대기중";
          spinBtn.classList.add('confirm-pending');
          spinBtn.disabled = false;
        } else {
          settleEarnings();
        }

        winningLines.forEach(lineId => {
          const path = document.getElementById(`payline-${lineId}`);
          if (path) path.classList.add('active');
        });

        winningCells.forEach(cellStr => {
          const [r, c] = cellStr.split('-').map(Number);
          const cellElement = reelStrips[r].children[c];
          if (cellElement) cellElement.classList.add('winner');
        });

        sound.playWin(totalWin);
      } else {
        spinBtn.disabled = false;
        updateUI();
        if (state.isAutoSpin) {
          state.autoSpinTimer = setTimeout(spin, 900);
        }
      }
      socket.emit('slot_spin_result', {
        pNum: pNum,
        betAmount: state.bet,
        winAmount: totalWin
      });
    }

    function settleEarnings() {
      const payout = state.pendingEarnings;
      if (payout <= 0) return;

      const previousBalance = state.balance;
      state.balance += payout;
      state.totalWin += payout;

      animateValue(balanceVal, previousBalance, state.balance, 700, true);
      animateValue(totalWinVal, state.totalWin - payout, state.totalWin, 700);

      winCard.classList.add('win-active');
      state.pendingEarnings = 0;

      if (!state.isPendingConfirm) {
        spinBtn.disabled = false;
        if (state.isAutoSpin) {
          state.autoSpinTimer = setTimeout(spin, 1200);
        }
      }
    }

    function confirmBigWin() {
      if (state.isButtonDelayActive) return;
      state.isPendingConfirm = false;
      bigWinBanner.classList.remove('show');
      bigWinOverlay.style.display = 'none';

      spinBtn.textContent = "스핀";
      spinBtn.classList.remove('confirm-pending');

      settleEarnings(); 
      resetVisualEffects();
    }

    function clearWinningEffects() {
      if (state.isButtonDelayActive) return;
      state.isPendingConfirm = false;
      bigWinBanner.classList.remove('show');
      bigWinOverlay.style.display = 'none';
      settleEarnings(); // 🔧 [수정] 대기 상태 해제 클릭 시에도 당첨금이 지갑에 정산되도록 보장
      resetVisualEffects();
    }

    function closeBigWin() {
      clearWinningEffects();
    }

    function resetVisualEffects() {
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          if (reelStrips[r].children[c]) reelStrips[r].children[c].classList.remove('winner');
        }
      }
      document.querySelectorAll('.payline-path').forEach(p => p.classList.remove('active'));
    }

    function toggleAutoSpin() {
      if (autoToggle.checked) {
        if (state.isPendingConfirm && !state.isButtonDelayActive) {
          clearWinningEffects();
        }
        state.isAutoSpin = true;
        autoStatus.textContent = "켜짐";
        autoStatus.style.color = "var(--magenta)";
        if (!state.isSpinning) spin();
      } else {
        stopAutoSpin();
      }
    }

    function stopAutoSpin() {
      state.isAutoSpin = false;
      autoToggle.checked = false;
      autoStatus.textContent = "꺼짐";
      autoStatus.style.color = "var(--cyan)";
      if (state.autoSpinTimer) {
        clearTimeout(state.autoSpinTimer);
        state.autoSpinTimer = null;
      }
    }

    function showAlert(title, message) {
      document.querySelector('#custom-alert div').textContent = title;
      alertMessage.textContent = message;
      customAlert.style.display = 'flex';
    }

    function closeAlert() {
      customAlert.style.display = 'none';
    }

    window.onload = initSlots;
  </script>
</body>
</html>
