<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 플레이어 게임 룸</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 📱 모바일 기본 베이스 설정 (스크롤 차단 및 터치 왜곡 방지) */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f172a; 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 모바일 특유의 튕기는 바운스 스크롤 방지 */
        }
        
        /* 전체 컨테이너를 모바일 스크린 비율(90%)에 맞춤 */
        .container { 
            width: 100%;
            max-width: 420px; 
            height: 100vh;
            max-height: 850px;
            padding: 20px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 상-중-하 요소를 화면에 균등 분배 */
        }

        /* 1. 상단 타이틀 존 */
        .header-zone { 
            text-align: center;
            padding: 10px 0;
        }
        h1 { font-size: 22px; margin: 0; color: #38bdf8; font-weight: 800; letter-spacing: -0.5px; }

        /* 2. 중앙 정보 메인 카드 (유동적 크기 확보) */
        .card { 
            background: #1e293b; 
            padding: 16px 20px; /* 위아래 패딩을 줄여 슬림하게 변경 */
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            text-align: left;
            flex-grow: 0; /* 🌟 무조건 화면을 꽉 채우던 성질을 끄고 콘텐츠 크기만큼만 차지하게 함 */
            margin: 15px 0; /* 카드 위아래 마진 최적화 */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card h3 { margin: 0 0 8px 0; color: #94a3b8; font-size: 14px; }
        .money-text { font-size: 34px; font-weight: 800; color: #10b981; margin: 5px 0; letter-spacing: -0.5px; }
        #game-info-line { font-size: 15px; color: #f59e0b; margin-top: 8px; font-weight: 600; }
        .status-wrapper { font-size: 14px; color: #cbd5e1; margin-top: 15px; border-top: 1px solid #334155; padding-top: 12px; }

        /* 3. 하단 조작 버튼 그룹 (모바일에서 누르기 편하게 확장) */
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(1px, 1fr)); 
            gap: 12px; 
            margin-bottom: 12px; 
        }
        .btn-group button { 
            height: 60px; /* 모바일 엄지손가락 크기에 맞춘 두툼한 높이 */
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-group button:active { transform: scale(0.96); } /* 모바일 터치 피드백 애니메이션 */
        
        /* 버튼 컬러셋 */
        .btn-raise { background: #f59e0b; color: black; }
        .btn-call { background: #3b82f6; }
        .btn-fold { background: #64748b; }
        .btn-hit { background: #10b981; }
        .btn-stay { background: #ef4444; }

        /* 🔴 하단 퇴장 버튼 스타일 */
        .btn-leave-bottom { 
            width: 100%; 
            background: #ef4444; 
            color: white; 
            border: none; 
            height: 52px;
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px; 
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-leave-bottom:hover { background: #dc2626; }

        /* 🎯 커스텀 모달 웹뷰 팝업 최적화 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 1000; 
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { 
            background: #1e293b; border: 2px solid #ef4444; width: 88%; max-width: 360px; 
            padding: 25px; border-radius: 20px; text-align: center; 
        }
        .modal-title { font-size: 18px; font-weight: bold; color: #ef4444; margin-bottom: 12px; }
        .modal-desc { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px; }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-zone">
            <h1 id="game-theme-header">🎰 GAME ROOM</h1>
        </div>

        <div class="card">
            <h3 id="player-title">플레이어</h3>
            <div class="money-text" id="table-money-display">0 칩</div>
            <div id="game-info-line">오프라인 게임 진행 대기 중</div>
            <div class="status-wrapper">
                현재 진행 상태: <span id="player-status" style="font-weight:bold; color:#52ea93;">대기</span>
            </div>
        </div>

        <div class="btn-group" id="dynamic-buttons"></div>

        <button class="btn-leave-bottom" onclick="openLeaveModal()">🔴 테이블 퇴장 (정산)</button>
    </div>

    <div class="modal-overlay" id="leaveModal">
        <div class="modal-box">
            <div class="modal-title">⚠️ 테이블 퇴장 안내</div>
            <div class="modal-desc">
                정말 테이블에서 나가시겠습니까?<br>
                현재 테이블 칩과 베팅금은 안전하게<br>
                <strong>원래 지갑 계정으로 정산 반환</strong>됩니다.
            </div>
            <div class="modal-btns">
                <button style="background:#ef4444; color:white;" onclick="confirmLeave()">퇴장하기</button>
                <button style="background:#475569; color:white;" onclick="closeLeaveModal()">계속 게임하기</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const pathSegments = window.location.pathname.split('/');
        const pNum = parseInt(pathSegments[pathSegments.length - 1]); 
        const urlParams = new URLSearchParams(window.location.search);
        const gameType = urlParams.get('type') || 'holdem';

        // 🚀 게임 타입별 UI 및 버튼 컴포넌트 렌더링 분기
        const btnContainer = document.getElementById('dynamic-buttons');
        
        if (gameType === 'blackjack') {
            document.getElementById('game-theme-header').innerText = "🃏 BLACKJACK ROOM";
            btnContainer.innerHTML = `
                <button class="btn-hit" onclick="sendAction('hit')">히트 (Hit)</button>
                <button class="btn-stay" onclick="sendAction('stay')">스테이 (Stay)</button>
            `;
        } else {
            document.getElementById('game-theme-header').innerText = gameType === 'holdem' ? "🎴 TEXAS HOLDEM" : "👑 INDIAN POKER";
            btnContainer.innerHTML = `
                <button class="btn-raise" onclick="sendAction('raise')">레이즈</button>
                <button class="btn-call" onclick="sendAction('call')">콜 / 체크</button>
                <button class="btn-fold" onclick="sendAction('fold')">다이 (Fold)</button>
            `;
        }

        function openLeaveModal() { document.getElementById('leaveModal').classList.add('active'); }
        function closeLeaveModal() { document.getElementById('leaveModal').classList.remove('active'); }
        function confirmLeave() { socket.emit('nfc_table_checkout', { pNum: pNum }); setTimeout(() => { window.location.href = `/wallet/${pNum}`; }, 250); }

        function sendAction(type) {
            socket.emit('player_action', { pNum: pNum, actionType: type });
        }

        socket.on('game_update', (data) => {
            const me = data.players.find(p => p.index === pNum);
            if (me) {
                document.getElementById('player-title').innerText = `👤 ${me.name} (${pNum}번 시트)`;
                document.getElementById('table-money-display').innerText = `${me.currentMoney.toLocaleString()} 칩`;
                
                if(gameType === 'blackjack') {
                    document.getElementById('game-info-line').innerHTML = `오프라인 카드를 확인하고 액션을 누르세요.`;
                } else {
                    document.getElementById('game-info-line').innerHTML = `내가 이번 판에 낸 판돈: <span style="font-weight:bold; color:#f59e0b;">${me.betAmount.toLocaleString()}</span> 칩`;
                }
                
                document.getElementById('player-status').innerText = me.status;

                // 턴 활성화/비활성화 처리
                const buttons = document.querySelectorAll('#dynamic-buttons button');
                if (me.status === "플레이 중") {
                    buttons.forEach(btn => { btn.style.opacity = "1"; btn.style.pointerEvents = "auto"; });
                } else {
                    buttons.forEach(btn => { btn.style.opacity = "0.3"; btn.style.pointerEvents = "none"; });
                }
            }
        });

        socket.on('error_msg', (data) => { alert(data.msg); });
    </script>
</body>
</html>
