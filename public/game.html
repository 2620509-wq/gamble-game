<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 플레이어 게임 룸</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f172a; color: white; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
        }
        .container { 
            width: 100%; max-width: 420px; height: 100vh; max-height: 850px; 
            padding: 20px; display: flex; flex-direction: column; justify-content: flex-start; 
        }
        .header-zone { text-align: center; padding: 10px 0; }
        h1 { font-size: 22px; margin: 0; color: #38bdf8; font-weight: 800; letter-spacing: -0.5px; }

        .card { 
            background: #1e293b; padding: 16px 20px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-align: left; flex-grow: 0; margin-top: 10px; margin-bottom: 15px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .card h3 { margin: 0 0 4px 0; color: #94a3b8; font-size: 14px; }
        .money-text { font-size: 34px; font-weight: 800; color: #10b981; margin: 5px 0; letter-spacing: -0.5px; }
        
        .bet-info-board {
            background: rgba(15, 23, 42, 0.5); padding: 10px 14px; border-radius: 10px; margin-top: 5px; font-size: 13px;
            display: flex; justify-content: space-between; border-left: 4px solid #f59e0b;
        }

        #game-info-line { font-size: 14px; color: #cbd5e1; margin-top: 10px; font-weight: 500; }
        .status-wrapper { font-size: 14px; color: #cbd5e1; margin-top: 12px; border-top: 1px solid #334155; padding-top: 10px; }

        /* 📱 2x2 완벽 정렬 그리드 시스템 */
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 15px; 
        }
        .btn-group button { 
            height: 58px; border: none; border-radius: 12px; font-size: 16px; 
            font-weight: bold; color: white; cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
            position: relative; z-index: 5; /* 🌟 터치 이벤트 최상단 고정 */
        }
        .btn-group button:active { transform: scale(0.95); }
        
        /* 버튼 개별 컬러셋 */
        .btn-raise { background: #f59e0b; color: black; }
        .btn-call { background: #3b82f6; }
        .btn-fold { background: #475569; }
        .btn-allin { background: #dc2626 !important; color: white !important; font-weight: 900; }
        .btn-hit { background: #10b981; }
        .btn-stay { background: #ef4444; }

        /* 🔴 퇴장 버튼 (클릭 영역 겹침 방지 적용) */
        .btn-leave-bottom { 
            width: 100%; background: #7f1d1d; color: #fca5a5; border: none; 
            height: 52px; border-radius: 12px; font-weight: bold; cursor: pointer; 
            font-size: 15px; margin-top: auto; margin-bottom: 100px;
            position: relative; z-index: 10;
        }

        /* 🎯 커스텀 모달 팝업 구조 안정화 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 2000; 
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { 
            background: #1e293b; border: 2px solid #ef4444; width: 88%; max-width: 360px; 
            padding: 25px; border-radius: 20px; text-align: center; 
        }
        .modal-title { font-size: 18px; font-weight: bold; color: #ef4444; margin-bottom: 12px; }
        .modal-desc { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px; }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-zone"><h1 id="game-theme-header">🎰 GAME ROOM</h1></div>

        <div class="card">
            <h3 id="player-title">플레이어</h3>
            <div class="money-text" id="table-money-display">0 칩</div>
            
            <div class="bet-info-board" id="bet-board-ui" style="display:none;">
                <div>토탈 팟: <span id="ui-total-pot" style="color:#10b981; font-weight:bold;">0</span></div>
                <div>현재 최고 배팅금: <span id="ui-current-bet" style="color:#f59e0b; font-weight:bold;">0</span></div>
            </div>

            <div id="game-info-line">오프라인 게임 진행 대기 중</div>
            <div class="status-wrapper">현재 진행 상태: <span id="player-status" style="font-weight:bold; color:#52ea93;">대기</span></div>
        </div>

        <div class="btn-group" id="dynamic-buttons"></div>

        <button class="btn-leave-bottom" onclick="openLeaveModal()">🔴 테이블 퇴장 (정산)</button>
    </div>

    <div class="modal-overlay" id="leaveModal">
        <div class="modal-box">
            <div class="modal-title">⚠️ 테이블 퇴장 안내</div>
            <div class="modal-desc">
                정말 테이블에서 나가시겠습니까?<br>
                현재 테이블 칩과 베팅금은 안전하게<br>
                <strong>원래 지갑 계정으로 정산 반환</strong>됩니다.
            </div>
            <div class="modal-btns">
                <button style="background:#ef4444; color:white;" onclick="confirmLeave()">퇴장하기</button>
                <button style="background:#475569; color:white;" onclick="closeLeaveModal()">계속 게임하기</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const pathSegments = window.location.pathname.split('/');
        const pNum = parseInt(pathSegments[pathSegments.length - 1]); 
        const urlParams = new URLSearchParams(window.location.search);
        const gameType = urlParams.get('type') || 'holdem';

        const btnContainer = document.getElementById('dynamic-buttons');
        
        // 🚀 초기 렌더링 시 버튼 그리기 및 ID 일관성 완벽 고정
        if (gameType === 'blackjack') {
            document.getElementById('game-theme-header').innerText = "🃏 BLACKJACK ROOM";
            btnContainer.style.gridTemplateColumns = "1fr"; 
            btnContainer.innerHTML = `
                <div style="display: flex; gap: 8px; margin-bottom: 5px;">
                    <input type="number" id="bj-bet-input" placeholder="베팅할 칩 입력" 
                           style="flex: 1; height: 48px; border-radius: 8px; border: 2px solid #3b82f6; background: #1e293b; color: white; padding: 0 12px; font-size: 15px; font-weight: bold;">
                    <button id="bj-bet-btn" style="width: 80px; height: 48px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold;" 
                            onclick="sendBjBet()">베팅</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%;">
                    <button id="bj-hit-btn" class="btn-hit" onclick="sendAction('hit')">히트 (Hit)</button>
                    <button id="bj-stay-btn" class="btn-stay" onclick="sendAction('stay')">스테이 (Stay)</button>
                </div>
            `;
        } else {
            document.getElementById('game-theme-header').innerText = gameType === 'holdem' ? "🎴 TEXAS HOLDEM" : "👑 INDIAN POKER";
            document.getElementById('bet-board-ui').style.display = 'flex'; 
            btnContainer.innerHTML = `
                <button class="btn-raise" onclick="sendAction('raise')">레이즈</button>
                <button class="btn-call" onclick="sendAction('call')">콜 / 체크</button>
                <button class="btn-fold" onclick="sendAction('fold')">다이 (Fold)</button>
                <button class="btn-allin" onclick="sendAction('allin')">ALL-IN</button>
            `;
        }

        function openLeaveModal() { document.getElementById('leaveModal').classList.add('active'); }
        // 🔧 classList.remove('remove') 오타 및 중복 제거 부분을 정돈했습니다.
        function closeLeaveModal() { document.getElementById('leaveModal').classList.remove('active'); }
        function confirmLeave() { socket.emit('nfc_table_checkout', { pNum: pNum }); setTimeout(() => { window.location.href = `/wallet/${pNum}`; }, 250); }

        function sendAction(type) {
            socket.emit('player_action', { pNum: pNum, actionType: type });
        }

        socket.on('game_update', (data) => {
            const me = data.players.find(p => p.index === pNum);
            const room = data.rooms[gameType];

            if (me && room) {
                document.getElementById('player-title').innerText = `👤 ${me.name} (${pNum}번 시트)`;
                document.getElementById('table-money-display').innerText = `${me.currentMoney.toLocaleString()} 칩`;
                
                if(gameType !== 'blackjack') {
                    document.getElementById('ui-total-pot').innerText = room.pot.toLocaleString();
                    document.getElementById('ui-current-bet').innerText = room.currentBet.toLocaleString();
                    document.getElementById('game-info-line').innerHTML = `내가 이번 판에 낸 판돈: <span style="color:#f59e0b; font-weight:bold;">${me.betAmount.toLocaleString()}</span> 칩`;
                } else {
                    document.getElementById('game-info-line').innerHTML = `오프라인 카드를 확인하고 액션을 누르세요.`;

                    // 🃏 [블랙잭 베팅 입력 영역 인터랙션 동기화]
                    const bjBetInput = document.getElementById('bj-bet-input'); 
                    const bjBetBtn = document.getElementById('bj-bet-btn');     

                    if (bjBetInput && bjBetBtn) {
                        // 베팅 금액이 들어가 있으면 베팅창은 계속 잠금 처리
                        if (me.betAmount > 0) {
                            bjBetInput.disabled = true;
                            bjBetBtn.disabled = true;
                            bjBetBtn.innerText = "베팅 완료";
                        } else {
                            bjBetInput.disabled = false;
                            bjBetBtn.disabled = false;
                            bjBetBtn.innerText = "베팅";
                        }
                    }
                }
                
                document.getElementById('player-status').innerText = me.status;

                // 🔒 조작 액션 버튼 그룹 권한 실시간 렌더링
                const gameActions = document.querySelectorAll('#dynamic-buttons button');
                
                if (me.status === "플레이 중") {
                    gameActions.forEach(btn => { 
                        if (btn.id !== "bj-bet-btn") {
                            // 🌟 [핵심 반영] 아직 베팅 금액이 0인 최초 베팅 턴 상태라면, 히트와 스테이 버튼을 강제로 비활성화합니다!
                            if (gameType === 'blackjack' && me.betAmount === 0) {
                                btn.style.opacity = "0.3"; 
                                btn.style.pointerEvents = "none"; 
                            } else {
                                // 전원 베팅이 끝난 뒤 돌아온 진짜 플레이 턴일 때는 버튼 활성화
                                btn.style.opacity = "1"; 
                                btn.style.pointerEvents = "auto"; 
                            }
                        }
                    });
                } else {
                    // 내 턴이 아니거나("순서 대기"), 최종 "스테이 완료"가 되면 즉시 조작을 차단합니다.
                    gameActions.forEach(btn => { 
                        if (btn.id !== "bj-bet-btn") {
                            btn.style.opacity = "0.3"; 
                            btn.style.pointerEvents = "none"; 
                        }
                    });
                }
            }
        });

        socket.on('error_msg', (data) => { 
            alert(data.msg); 
            if (gameType === 'blackjack') {
                const bjBetInput = document.getElementById('bj-bet-input');
                const bjBetBtn = document.getElementById('bj-bet-btn');
                if (bjBetInput && bjBetBtn) {
                    bjBetInput.disabled = false;
                    bjBetBtn.disabled = false;
                    bjBetBtn.innerText = "베팅";
                }
            }
        });

        // 🎲 블랙잭 수동 베팅 전송 전용 함수 (ID 완벽 수정)
        function sendBjBet() {
            const bjBetInput = document.getElementById('bj-bet-input');
            const bjBetBtn = document.getElementById('bj-bet-btn');
            
            if (!bjBetInput || !bjBetBtn) return;
            
            const amount = parseInt(bjBetInput.value);

            if (isNaN(amount) || amount <= 0) {
                alert("올바른 베팅 금액을 입력해 주세요.");
                return;
            }

            // 🔒 중복 베팅 연타 완벽 방어
            bjBetInput.disabled = true;
            bjBetBtn.disabled = true;
            bjBetBtn.innerText = "전송 중...";

            socket.emit('player_action', {
                pNum: pNum,
                gameType: 'blackjack',
                actionType: 'bj_bet',
                amount: amount
            });
        }
    </script>
</body>
</html>
