<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎰 하우스 완전 자동화 관리실</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .game-zone { padding: 15px; border-radius: 12px; min-height: 280px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; }
        .bg-bj { background: #064e3b; border: 1px solid #10b981; }
        .bg-hd { background: #450a0a; border: 1px solid #f43f5e; }
        .bg-ip { background: #2e1065; border: 1px solid #a855f7; }
        .q-list { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 13px; min-height: 100px; flex-grow: 1; overflow-y: auto; }
        .pot-text { font-size: 18px; font-weight: bold; color: #f59e0b; margin: 5px 0; }
        .btn-start { width: 100%; padding: 10px; background: #10b981; color: white; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
        
        /* 🏆 정산 구역 스타일 */
        .settle-box { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 6px; display: flex; gap: 5px; align-items: center; }
        .settle-input { width: 45% !important; padding: 6px !important; margin: 0 !important; text-align: center; }
        .btn-win { width: 50%; padding: 8px; background: #f59e0b; color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .p-card { background: #1e293b; padding: 10px; border-radius: 8px; font-size: 12px; }
        input { width: 80%; padding: 4px; margin: 2px 0; background: #0f172a; color: white; border: 1px solid #475569; }
    </style>
</head>
<body>

    <h2>📊 1. 실시간 테이블 게임 제어 (자동 배팅 및 수동 정산)</h2>
    <div class="dashboard">
        <div class="game-zone bg-bj">
            <div>
                <h3>🃏 블랙잭 매트</h3>
                <div class="pot-text">💰 토탈 팟: <span id="pot-blackjack">0</span> 칩</div>
            </div>
            <div class="q-list" id="queue-blackjack">대기 없음</div>
            <div>
                <button class="btn-start" onclick="startRound('blackjack')">🎲 대기자 랜덤 셔플 게임 시작</button>
                <div class="settle-box">
                    <input type="number" id="win-idx-blackjack" class="settle-input" placeholder="승자 시트 번호">
                    <button class="btn-win" onclick="giveWin('blackjack')">🏆 승자 정산</button>
                </div>
            </div>
        </div>
        
        <div class="game-zone bg-hd">
            <div>
                <h3>🎴 텍사스 홀덤 매트</h3>
                <div class="pot-text">💰 토탈 팟: <span id="pot-holdem">0</span> 칩</div>
            </div>
            <div class="q-list" id="queue-holdem">대기 없음</div>
            <div>
                <button class="btn-start" onclick="startRound('holdem')">🎲 대기자 랜덤 셔플 게임 시작</button>
                <div class="settle-box">
                    <input type="number" id="win-idx-holdem" class="settle-input" placeholder="승자 시트 번호">
                    <button class="btn-win" onclick="giveWin('holdem')">🏆 승자 정산</button>
                </div>
            </div>
        </div>
        
        <div class="game-zone bg-ip">
            <div>
                <h3>👑 인디안 포커 매트</h3>
                <div class="pot-text">💰 토탈 팟: <span id="pot-indian">0</span> 칩</div>
            </div>
            <div class="q-list" id="queue-indian">대기 없음</div>
            <div>
                <button class="btn-start" onclick="startRound('indian')">🎲 대기자 랜덤 셔플 게임 시작</button>
                <div class="settle-box">
                    <input type="number" id="win-idx-indian" class="settle-input" placeholder="승자 시트 번호">
                    <button class="btn-win" onclick="giveWin('indian')">🏆 승자 정산</button>
                </div>
            </div>
        </div>
    </div>

    <h2>👤 2. 시트 멤버 매핑 테이블</h2>
    <div class="grid" id="player-grid"></div>

    <script>
        const socket = io();

        const grid = document.getElementById('player-grid');
        for (let i = 1; i <= 12; i++) {
            grid.innerHTML += `
                <div class="p-card">
                    <b>📍 ${i}번</b><br>
                    <input type="text" id="name-${i}" placeholder="이름">
                    <input type="number" id="money-${i}" value="0">
                    <button style="width:90%; background:#3b82f6; border:none; color:white; padding:3px;" onclick="updatePlayer(${i})">갱신</button>
                </div>
            `;
        }

        socket.on('game_update', (data) => {
            const types = ['blackjack', 'holdem', 'indian'];
            types.forEach(type => {
                document.getElementById(`pot-${type}`).innerText = data.rooms[type].pot.toLocaleString();
                const qBox = document.getElementById(`queue-${type}`);
                
                let html = "<div style='color:#52ea93; font-weight:bold;'>[현재 참여자 상태]</div>";
                
                const room = data.rooms[type];
                if(room.turnOrder && room.turnOrder.length > 0){
                    room.turnOrder.forEach((pIndex, seq) => {
                        const p = data.players.find(player => player.index === pIndex);
                        let stateText = p.status;
                        if (p.status === "플레이 중") stateText = "🔥 [내 턴]";
                        html += `<div>${seq+1}번: ${p.name} <span style="color:#f43f5e">${stateText}</span> (베팅: ${p.betAmount})</div>`;
                    });
                } else {
                    html += "<div>진행 중인 판 없음</div>";
                }

                html += "<div style='color:#38bdf8; font-weight:bold; margin-top:10px;'>[줄 서있는 대기자 목록]</div>";
                if(data.queues[type].length === 0){
                    html += "<div>대기열 비었음</div>";
                } else {
                    data.queues[type].forEach(pIdx => {
                        const p = data.players.find(player => player.index === pIdx);
                        html += `<div>• ${p.name} (${pIdx}번 시트)</div>`;
                    });
                }
                qBox.innerHTML = html;
            });
        });

        function updatePlayer(pNum) {
            const newName = document.getElementById(`name-${pNum}`).value;
            const initMoney = document.getElementById(`money-${pNum}`).value;
            fetch('/api/admin/change-player', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pNum: pNum, newName: newName, initMoney: initMoney })
            });
        }

        function startRound(gameType) { socket.emit('admin_start_round', { gameType: gameType }); }
        
        // 🏆 딜러가 직접 최종 승자 시트 번호를 입력해 정산하는 함수
        function giveWin(gameType) {
            const wIdx = document.getElementById(`win-idx-${gameType}`).value;
            if(!wIdx) return alert("승리한 플레이어의 시트 번호를 입력하세요!");
            
            socket.emit('admin_game_win', { gameType: gameType, winnerIndex: wIdx });
            document.getElementById(`win-idx-${gameType}`).value = ""; // 입력창 초기화
        }
    </script>
</body>
</html>
